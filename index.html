<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fast Delivery - logistica eficiente</title>
</head>
<body>
    
    
    <header>
        <h1>Fast Delivery</h1>
        <nav>
            <ul>
                <li><a href="#rastreo">Rastrear envio</a></li>
                <li><a href="#servicios">Servicios</a></li>
                <li><a href="#tarifas">Tarifas</a></li>
                <li><a href="#acceso">Acceso Clientes</a></li>
                <li><a href="#contacto">Contáctenos</a></li>
        </ul>
        </nav>
    </header>

    <main>

<section id="rastreo">
    <h2>Rastrea tu paquete</h2>
    <p>Ingresa el número de guia para conocer el estado de tu envío en tiempo real.</p>
    <from>
        <label for="numero-guia">Numero de guia:</label>
        <input type="text"  id="numero-guia" name="gia" placeholder="EJ: 154432">
        <button type="submit">Consultar Estado</button>
    </from>
</section>


<figure>

<section id="servicios">
    <h2>Nuestros Servicios de entrega</h2>
    <ul>
        <li><strong>Envio Express:</strong> Entrega gaarantizada en menos de 24 horas</li>
        <li><strong>Envio nacional:</strong>Cobertura en todo el pais</li>
        <li><strong>Logistica Corporativa:</strong> Soluciones para grandes empresas.</li>
    </ul>

    <h3>Conoce nuentra flota</h3>
    
    <img src="imagenes/mula fast delivery.webp" alt="Camion de fast Delivery en carretera">

    <h3>video promocional</h3>
    <iframe width="200" height="200"
    src="https://www.youtube.com/embed/diIOpkc3DvY" title="EXPERIENCIAS DE POLICÍAS ESTATALES | HISTORIAS DE TERROR" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen>
    </iframe>
</section>

<hr>

<section id="=tarifas">
    <h2>Tarifas de envio 2026</h2>
    <table border="1">
        <thead>
            <tr>
                <th>Peso del paquete</th>
                <th>Costo Local</th>
                <th>Costo Nacional</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>0kg - 5kg</td>
                <td>$3.ooo</td>
                <td>$6.000</td>
            </tr>
            <tr>
                <td>5kg - 10kg</td>
                <td>$6.000</td>
                <td>$12.000</td>
            </tr>
            <tr>
                <td>Más de 10kg</td>
                <td>$10.000</td>
                <td>$25.000</td>
            </tr>
        </tbody>
    </table>
</section>

<hr>

<section id="acceso">
    <h2>Area de Clientes</h2>
    <h3>Iniciar Sesión</h3>
    <form action="/login" method="post">
        <label>Correo Electronico:</label><br>
        <input type="email" name="user_email" required><br>
        <label>contraseña:</label><br>
        <input type="password" name="user_password" required><br>
        <button type="submit">Entrar</button>
    </form>


    <h3>Registro de Nuevo Usuario</h3>
    <form action="/registro" method="post">
        <label>Nombre completo:</label><br>
        <input type="text" name="full_name"><br>
        <label>Correo Electronico:</label><br>
        <input type="email" name="reg_email"><br>
        <label>Crear Contraseña:</label><br>
        <input type="password" name="reg_password">
        <button type="submit">Registrarse</button><br>
    </form>

    <h3>¿Olvidaste tu contraseña?</h3>
    <form acction="/recuperar" method="post">
        <p>Ingresa tu correo para enviarte un enlace de recuperacion:</p>
        <input type="email" placeholder="tu@email.com">
        <button type="submit">Enviar Enlace</button>
    </form>
</section>

<hr>

<section id="contacto">
    <h2>contactenos</h2>
    <form>
        <label>Nombre:</label><br>
        <input type="text" name="nombre_contacto"><br>
        <label>Asunto:</label><br>
        <input type="text" name="asunto_contacto"><br>
        <label>Mensaje:</label><br>
        <textarea name="mensaje" rows="5" cols="30"></textarea><br>
        <button type="submit">Enviar Mensaje</button>
    </form>
</section>

</main>

<footer>
    <p><strong>Fast Delivery S.A.</strong></p>
    <P>&COPY; 2026 Todos los derechos reservados</P>
</footer>

</body>
</html>
